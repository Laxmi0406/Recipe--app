<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Recipe Finder App</title>

    <!-- Font Awesome -->
    <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    >

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- HEADER -->

    <header>

        <nav>

            <h1>
                🍽 Recipe Finder
            </h1>

            <form id="searchForm">

                <input
                    type="text"
                    placeholder="Search your favourite recipe..."
                    class="SearchBox"
                >

                <button
                    type="submit"
                    class="searchbtn"
                >
                    Search
                </button>

            </form>

        </nav>

    </header>

    <!-- MAIN -->

    <main>

        <section>

            <div class="recipe-container">

                <h2>
                    Search Your Favourite Recipes 🍕
                </h2>

            </div>

        </section>

    </main>

    <!-- POPUP -->

    <div class="recipe-details">

        <div class="recipe-details-content">

            <button
                type="button"
                class="recipe-close-btn"
            >
                &times;
            </button>

        </div>

    </div>

    <!-- JS -->

    <script src="script.js"></script>

</body>
</html>
